<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- SVG favicon (cart) to replace React icon -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg?v=3" />
    <!-- PNG fallbacks (crisp, lightweight) -->
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png?v=1" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png?v=1" />
    <!-- Shortcut icon for older browsers (avoid default CRA favicon.ico) -->
    <link rel="shortcut icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg?v=3" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1266f1" />

    <meta name="application-name" content="SmartGrocery Lite" />
    <meta name="apple-mobile-web-app-title" content="SmartGrocery Lite" />

    <!-- Open Graph for rich link previews (Discord, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SmartGrocery Lite" />
    <meta property="og:site_name" content="SmartGrocery Lite" />
    <meta property="og:description" content="Simple, shared grocery lists to plan and shop together faster." />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:url" content="https://smartgrocery.online/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SmartGrocery Lite" />
    <meta name="twitter:description" content="Simple, shared grocery lists to plan and shop together faster." />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />
    <link rel="canonical" href="https://smartgrocery.online/" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png?v=1" />

    <!-- PWA manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <title>SmartGrocery Lite</title>
  </head>
